<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cursos · Adrian Reyes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        /* ================================================
           ESTILOS GENERALES
        ================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: #0A0A0F;
            color: white;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ================================================
           NAVBAR
        ================================================ */
        .navbar {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(191, 255, 0, 0.15);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            transition: all 0.3s;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            color: #BFFF00;
            background: rgba(191, 255, 0, 0.1);
        }

        .nav-links a.active {
            color: #BFFF00;
            font-weight: 700;
        }

        .btn-login {
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            color: #0A0A0F;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(191, 255, 0, 0.3);
            font-family: 'Rubik', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(191, 255, 0, 0.5);
        }

        /* ================================================
           HEADER
        ================================================ */
        .page-header {
            padding: 60px 0 40px;
            text-align: center;
        }

        .page-title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-sub {
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ================================================
           CONFIGURACIÓN SUPABASE
        ================================================ */
        .supabase-config {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(191, 255, 0, 0.05);
            border: 1px solid rgba(191,255,0,0.2);
            border-radius: 12px;
        }

        .supabase-config h3 {
            color: #BFFF00;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .supabase-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
        }

        .supabase-field {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(191, 255, 0, 0.3);
            border-radius: 8px;
            color: white;
            font-family: 'Rubik', sans-serif;
            font-size: 13px;
        }

        .supabase-field:focus {
            outline: none;
            border-color: #BFFF00;
        }

        .btn-supabase {
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            color: #0A0A0F;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .connection-status {
            margin-top: 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF4444;
        }

        .status-dot.connected {
            background: #BFFF00;
        }

        /* ================================================
           GRID DE PLAYLISTS
        ================================================ */
        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .playlist-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(191, 255, 0, 0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .playlist-card:hover {
            transform: translateY(-5px);
            border-color: #BFFF00;
            box-shadow: 0 15px 30px rgba(191, 255, 0, 0.15);
        }

        .playlist-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, rgba(191, 255, 0, 0.1), rgba(0, 255, 194, 0.05));
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .playlist-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-image i {
            font-size: 50px;
            color: rgba(191, 255, 0, 0.3);
        }

        .playlist-header {
            padding: 20px;
            border-bottom: 1px solid rgba(191, 255, 0, 0.2);
        }

        .playlist-header h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .playlist-header p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .playlist-meta {
            display: flex;
            gap: 15px;
            color: #BFFF00;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .playlist-price {
            font-size: 24px;
            font-weight: 800;
            color: #BFFF00;
            margin: 10px 0;
        }

        .playlist-price small {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* Barra de progreso */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #BFFF00, #00FFC2);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #BFFF00;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* Video list */
        .video-list {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            flex: 1;
        }

        .video-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(191, 255, 0, 0.05);
            position: relative;
        }

        .video-item.watched {
            opacity: 0.7;
        }

        .video-item.watched::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 10px;
            color: #BFFF00;
            font-size: 14px;
        }

        .video-item:last-child {
            border-bottom: none;
        }

        .video-item:hover {
            background: rgba(191, 255, 0, 0.05);
        }

        .video-thumbnail {
            width: 60px;
            height: 34px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-thumbnail i {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .video-info {
            flex: 1;
        }

        .video-info h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .video-info .video-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }

        /* Botón de WhatsApp */
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 15px;
            text-decoration: none;
        }

        .btn-whatsapp:hover {
            background: #20BD5A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        /* Sección de reseñas */
        .reviews-section {
            padding: 20px;
            border-top: 1px solid rgba(191, 255, 0, 0.2);
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reviews-header h4 {
            color: #BFFF00;
            font-size: 16px;
        }

        .average-rating {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stars {
            color: #FFD700;
        }

        .stars i {
            margin-right: 2px;
        }

        .review-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .review-author {
            font-weight: 600;
            color: #BFFF00;
        }

        .review-date {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .review-stars {
            color: #FFD700;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .review-text {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }

        .btn-review {
            background: rgba(191, 255, 0, 0.1);
            border: 1px solid rgba(191, 255, 0, 0.3);
            color: #BFFF00;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
            text-align: center;
        }

        .btn-review:hover {
            background: rgba(191, 255, 0, 0.2);
        }

        .btn-review i {
            font-size: 12px;
        }

        /* Contenedor de botones de acción */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 15px;
        }

        .action-buttons button {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            padding: 10px;
        }

        /* Botón de certificado */
        .btn-certificate {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .btn-certificate:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .btn-certificate i {
            font-size: 13px;
        }

        /* ================================================
           MENSAJE SIN ACCESO
        ================================================ */
        .no-access {
            text-align: center;
            padding: 60px 40px;
            background: rgba(191, 255, 0, 0.03);
            border: 1px dashed rgba(191, 255, 0, 0.3);
            border-radius: 30px;
            margin: 40px 0;
        }

        .no-access i {
            font-size: 60px;
            color: #BFFF00;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-access h3 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .no-access p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 25px;
        }

        .no-access .btn-login {
            margin: 0 auto;
            display: inline-block;
        }

        /* ================================================
           MODALES
        ================================================ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: #1A1A1F;
            border: 1px solid #BFFF00;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: #FF4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 30px;
        }

        .modal-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(191, 255, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: 'Rubik', sans-serif;
            color: white;
            font-size: 14px;
        }

        .modal-field:focus {
            outline: none;
            border-color: #BFFF00;
        }

        /* Video player modal */
        .video-player-modal {
            max-width: 900px !important;
        }

        .video-player-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .video-player-container iframe,
        .video-player-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ================================================
           MENÚ DE USUARIO
        ================================================ */
        .user-menu {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #1A1A1F;
            border: 1px solid #BFFF00;
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
            min-width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .user-menu p {
            margin-bottom: 10px;
        }

        .user-menu strong {
            color: #BFFF00;
        }

        .btn-logout {
            background: #FF4444;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #FF6666;
            transform: translateY(-2px);
        }

        /* ================================================
           TOAST
        ================================================ */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1A1A1F;
            border: 1px solid #BFFF00;
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            font-size: 14px;
            z-index: 10002;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        .toast i {
            color: #BFFF00;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0%); opacity: 1; }
        }

        /* ================================================
           FOOTER
        ================================================ */
        .footer {
            padding: 40px 0 30px;
            border-top: 1px solid rgba(191, 255, 0, 0.1);
            margin-top: 60px;
        }

        .footer-bottom {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }

        /* ================================================
           RESPONSIVE
        ================================================ */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .supabase-inputs {
                grid-template-columns: 1fr;
            }
            .playlists-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .modal-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo" onclick="window.location.href='index.html'">Adrian Reyes</div>
            
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cursos.html" class="active">Cursos</a></li>
            </ul>

            <button class="btn-login" id="loginBtn" onclick="abrirModalLogin()">
                <i class="fas fa-user"></i> Iniciar sesión
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Configuración de Supabase -->
        <div class="supabase-config">
            <h3><i class="fas fa-cloud"></i> Conectar a Supabase</h3>
            <div class="supabase-inputs">
                <input type="text" class="supabase-field" id="supabaseUrl" placeholder="URL de Supabase" value="https://egrepsiyopylqjoxocly.supabase.co">
                <input type="text" class="supabase-field" id="supabaseKey" placeholder="API Key de Supabase" value="https://egrepsiyopylqjoxocly.supabase.co">
                <button class="btn-supabase" onclick="conectarSupabase()">
                    <i class="fas fa-plug"></i> Conectar
                </button>
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span>No conectado a Supabase</span>
            </div>
        </div>

        <div class="page-header">
            <h1 class="page-title">Mis Cursos</h1>
            <p class="page-sub">Explora nuestro contenido educativo</p>
        </div>

        <div id="contenidoPrincipal"></div>
    </div>

    <!-- Modal Login CON OJITO -->
    <div class="modal" id="loginModal">
        <div class="modal-card" style="max-width: 400px;">
            <button class="modal-close" onclick="cerrarModal('loginModal')">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title">Iniciar Sesión</h3>
            
            <input type="text" class="modal-field" id="loginUser" placeholder="Usuario">
            
            <div style="position: relative;">
                <input type="password" class="modal-field" id="loginPass" placeholder="Contraseña" style="padding-right: 45px;">
                <button type="button" onclick="togglePassword('loginPass', this)" style="position: absolute; right: 10px; top: 12px; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button class="modal-btn" onclick="iniciarSesion()">Ingresar</button>
        </div>
    </div>

    <!-- Modal Video Player CON BOTÓN X -->
    <div class="modal" id="videoPlayerModal">
        <div class="modal-card video-player-modal">
            <button class="modal-close" onclick="cerrarVideoPlayer()">
                <i class="fas fa-times"></i>
            </button>
            <div class="video-player-container" id="videoPlayerContainer"></div>
            <h3 id="currentVideoTitle" style="margin-top:20px; color:#BFFF00; text-align:center;"></h3>
            <button class="btn-primary" onclick="marcarVideoComoVisto()" style="margin-top:15px; width:100%;">
                <i class="fas fa-check"></i> Marcar como visto
            </button>
        </div>
    </div>

    <!-- Modal para agregar reseña -->
    <div class="modal" id="reviewModal">
        <div class="modal-card" style="max-width: 500px;">
            <button class="modal-close" onclick="cerrarModal('reviewModal')">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title">Agregar Reseña</h3>
            <input type="hidden" id="reviewPlaylistId">
            
            <div style="margin-bottom: 20px; text-align: center;">
                <label style="display: block; margin-bottom: 10px; color:#BFFF00;">Tu calificación:</label>
                <div class="star-rating" style="font-size: 30px; color: #FFD700;">
                    <i class="far fa-star" onclick="setRating(1)"></i>
                    <i class="far fa-star" onclick="setRating(2)"></i>
                    <i class="far fa-star" onclick="setRating(3)"></i>
                    <i class="far fa-star" onclick="setRating(4)"></i>
                    <i class="far fa-star" onclick="setRating(5)"></i>
                </div>
                <input type="hidden" id="reviewRating" value="0">
            </div>
            
            <textarea class="modal-field" id="reviewText" placeholder="Escribe tu comentario..." rows="4"></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-secondary" onclick="cerrarModal('reviewModal')" style="flex:1; background: transparent; border: 1px solid rgba(191,255,0,0.3); color: white; padding: 12px; border-radius: 12px; cursor: pointer;">Cancelar</button>
                <button class="btn-primary" onclick="guardarResena()" style="flex:1; background: linear-gradient(135deg, #BFFF00, #00FFC2); color: #0A0A0F; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer;">Publicar</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 Adrian Reyes. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // ================================================
        // VARIABLES GLOBALES
        // ================================================
        
        // Configuración de Supabase
        let supabase = null;
        let supabaseConnected = false;
        
        // Datos
        let playlists = [];
        let videos = [];
        let usuarios = [];
        let progreso = {};
        let reseñas = [];

        // Número de WhatsApp
        const WHATSAPP_NUMBER = "50432513558";
        const WHATSAPP_MESSAGE = "Hola! Me interesa comprar el curso: ";

        // Usuario actual
        let usuarioActual = null;
        let videoActual = null;

        // ================================================
        // FUNCIONES DE SUPABASE
        // ================================================
        
        function conectarSupabase() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                mostrarToast('❌ Ingresa URL y Key de Supabase', 'error');
                return;
            }
            
            try {
                supabase = supabaseJs.createClient(url, key);
                supabaseConnected = true;
                
                // Actualizar UI
                document.querySelector('.status-dot').classList.add('connected');
                document.querySelector('.connection-status span:last-child').textContent = 'Conectado a Supabase';
                
                mostrarToast('✅ Conectado a Supabase');
                
                // Cargar datos desde Supabase
                cargarDesdeSupabase();
                
            } catch(e) {
                mostrarToast('❌ Error al conectar: ' + e.message, 'error');
            }
        }

        async function cargarDesdeSupabase() {
            if (!supabaseConnected) return;
            
            try {
                // Cargar playlists
                const { data: playlistsData, error: playlistsError } = await supabase
                    .from('playlists')
                    .select('*');
                
                if (!playlistsError && playlistsData) {
                    playlists = playlistsData;
                }
                
                // Cargar videos
                const { data: videosData, error: videosError } = await supabase
                    .from('videos')
                    .select('*');
                
                if (!videosError && videosData) {
                    videos = videosData;
                }
                
                // Cargar usuarios
                const { data: usuariosData, error: usuariosError } = await supabase
                    .from('usuarios')
                    .select('*');
                
                if (!usuariosError && usuariosData) {
                    usuarios = usuariosData;
                }
                
                renderizarContenido();
                mostrarToast('✅ Datos cargados desde Supabase');
                
            } catch(e) {
                console.error('Error cargando datos:', e);
                mostrarToast('❌ Error cargando datos', 'error');
            }
        }

        // ================================================
        // FUNCIONES GENERALES
        // ================================================
        
        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icono = tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icono}"></i> ${mensaje}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function cerrarModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ================================================
        // LOGIN
        // ================================================
        
        function abrirModalLogin() {
            document.getElementById('loginModal').classList.add('active');
        }

        function iniciarSesion() {
            const login = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            
            const usuario = usuarios.find(u => u.login === login && u.pass === pass);
            
            if (usuario) {
                usuarioActual = usuario;
                sessionStorage.setItem('usuario_actual', JSON.stringify(usuario));
                cerrarModal('loginModal');
                actualizarBoton();
                renderizarContenido();
                mostrarToast(`✅ Bienvenido ${usuario.nombre}`);
            } else {
                alert('❌ Usuario o contraseña incorrectos');
            }
        }

        function cerrarSesion() {
            usuarioActual = null;
            sessionStorage.removeItem('usuario_actual');
            actualizarBoton();
            renderizarContenido();
            mostrarToast('👋 Sesión cerrada');
        }

        function actualizarBoton() {
            const btn = document.getElementById('loginBtn');
            if (usuarioActual) {
                btn.innerHTML = `<i class="fas fa-user-check"></i> ${usuarioActual.nombre}`;
                btn.onclick = mostrarMenu;
            } else {
                btn.innerHTML = '<i class="fas fa-user"></i> Iniciar sesión';
                btn.onclick = abrirModalLogin;
            }
        }

        function mostrarMenu() {
            const menuExistente = document.querySelector('.user-menu');
            if (menuExistente) menuExistente.remove();

            const menu = document.createElement('div');
            menu.className = 'user-menu';
            menu.innerHTML = `
                <p><strong>${usuarioActual.nombre}</strong></p>
                <p style="color:rgba(255,255,255,0.5);">@${usuarioActual.login}</p>
                ${usuarioActual.login === 'adrian' ? `
                    <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
                ` : ''}
            `;
            document.body.appendChild(menu);

            setTimeout(() => {
                document.addEventListener('click', function cerrar(e) {
                    if (!menu.contains(e.target) && !e.target.closest('#loginBtn')) {
                        menu.remove();
                        document.removeEventListener('click', cerrar);
                    }
                });
            }, 100);
        }

        // ================================================
        // SISTEMA DE PROGRESO
        // ================================================
        
        function marcarVideoComoVisto() {
            if (!usuarioActual || !videoActual) return;
            
            const userId = usuarioActual.id;
            const videoId = videoActual.id;
            
            if (!progreso[userId]) {
                progreso[userId] = {};
            }
            
            if (!progreso[userId][videoId]) {
                progreso[userId][videoId] = true;
                localStorage.setItem('progreso', JSON.stringify(progreso));
                
                // Actualizar la interfaz
                const videoItem = document.querySelector(`.video-item[data-video-id="${videoId}"]`);
                if (videoItem) {
                    videoItem.classList.add('watched');
                }
                
                mostrarToast('✅ Video marcado como visto');
                
                // Actualizar progreso de la playlist
                actualizarProgresoPlaylist(videoActual.playlistId);
            }
        }

        function actualizarProgresoPlaylist(playlistId) {
            if (!usuarioActual) return;
            
            const userId = usuarioActual.id;
            const videosPlaylist = videos.filter(v => v.playlistId === playlistId);
            const videosVistos = videosPlaylist.filter(v => progreso[userId]?.[v.id]).length;
            const porcentaje = Math.round((videosVistos / videosPlaylist.length) * 100);
            
            const progressBar = document.querySelector(`.progress-fill[data-playlist="${playlistId}"]`);
            const progressText = document.querySelector(`.progress-text[data-playlist="${playlistId}"]`);
            
            if (progressBar) {
                progressBar.style.width = porcentaje + '%';
            }
            
            if (progressText) {
                progressText.innerHTML = `${videosVistos}/${videosPlaylist.length} videos`;
            }
            
            // Verificar si completó el curso
            if (porcentaje === 100) {
                mostrarToast(`🎓 ¡Felicidades! Completaste el curso`);
            }
        }

        // ================================================
        // SISTEMA DE RESEÑAS
        // ================================================
        
        let ratingTemporal = 0;

        window.setRating = function(rating) {
            ratingTemporal = rating;
            document.getElementById('reviewRating').value = rating;
            
            const stars = document.querySelectorAll('.star-rating i');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.className = 'fas fa-star';
                } else {
                    star.className = 'far fa-star';
                }
            });
        };

        function abrirModalReview(playlistId) {
            if (!usuarioActual) {
                alert('Debes iniciar sesión para dejar una reseña');
                return;
            }
            
            document.getElementById('reviewPlaylistId').value = playlistId;
            document.getElementById('reviewText').value = '';
            setRating(0);
            document.getElementById('reviewModal').classList.add('active');
        }

        async function guardarResena() {
            const playlistId = document.getElementById('reviewPlaylistId').value;
            const rating = document.getElementById('reviewRating').value;
            const text = document.getElementById('reviewText').value.trim();
            
            if (rating === '0') {
                alert('Por favor selecciona una calificación');
                return;
            }
            
            if (!text) {
                alert('Por favor escribe un comentario');
                return;
            }
            
            const nuevaResena = {
                id: Date.now(),
                playlistId,
                userId: usuarioActual.id,
                userName: usuarioActual.nombre,
                rating: parseInt(rating),
                text,
                date: new Date().toLocaleDateString('es-ES')
            };
            
            reseñas.push(nuevaResena);
            localStorage.setItem('reseñas', JSON.stringify(reseñas));
            
            cerrarModal('reviewModal');
            renderizarContenido();
            mostrarToast('✅ Reseña publicada');
        }

        function calcularPromedio(playlistId) {
            const reseñasPlaylist = reseñas.filter(r => r.playlistId === playlistId);
            if (reseñasPlaylist.length === 0) return 0;
            
            const suma = reseñasPlaylist.reduce((acc, r) => acc + r.rating, 0);
            return (suma / reseñasPlaylist.length).toFixed(1);
        }

        // ================================================
        // SISTEMA DE CERTIFICADOS
        // ================================================
        
        function generarCertificado(playlistId, playlistNombre) {
            if (!usuarioActual) return;
            
            const userId = usuarioActual.id;
            const videosPlaylist = videos.filter(v => v.playlistId === playlistId);
            const videosVistos = videosPlaylist.filter(v => progreso[userId]?.[v.id]).length;
            const porcentaje = Math.round((videosVistos / videosPlaylist.length) * 100);
            
            if (porcentaje < 100) {
                alert('Debes completar todos los videos para obtener el certificado');
                return;
            }
            
            // Crear certificado en HTML
            const certificado = `
                <div style="
                    background: white;
                    color: black;
                    padding: 50px;
                    text-align: center;
                    border: 20px solid #BFFF00;
                    border-radius: 20px;
                    font-family: 'Rubik', sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                ">
                    <h1 style="font-size: 48px; color: #0A0A0F; margin-bottom: 20px;">CERTIFICADO</h1>
                    <p style="font-size: 20px; color: #666;">Otorgado a</p>
                    <h2 style="font-size: 36px; color: #BFFF00; margin: 20px 0;">${usuarioActual.nombre}</h2>
                    <p style="font-size: 18px; color: #666;">Por haber completado exitosamente el curso</p>
                    <h3 style="font-size: 28px; color: #0A0A0F; margin: 20px 0;">${playlistNombre}</h3>
                    <p style="font-size: 16px; color: #999; margin-top: 40px;">Fecha: ${new Date().toLocaleDateString('es-ES')}</p>
                    <p style="font-size: 14px; color: #999; margin-top: 20px;">Adrian Reyes · Educación Creativa</p>
                </div>
            `;
            
            // Abrir en nueva ventana para imprimir
            const ventana = window.open('', '_blank');
            ventana.document.write(`
                <html>
                    <head>
                        <title>Certificado - ${playlistNombre}</title>
                        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
                    </head>
                    <body style="margin: 0; padding: 20px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
                        ${certificado}
                        <script>
                            window.onload = function() {
                                window.print();
                            }
                        <\/script>
                    </body>
                </html>
            `);
        }

        // ================================================
        // MOSTRAR CONTENIDO
        // ================================================
        
        function renderizarContenido() {
            const container = document.getElementById('contenidoPrincipal');
            
            // Cargar datos de localStorage como respaldo
            if (playlists.length === 0) {
                playlists = JSON.parse(localStorage.getItem('playlists')) || [];
                videos = JSON.parse(localStorage.getItem('videos')) || [];
            }
            
            if (playlists.length === 0) {
                container.innerHTML = `
                    <div class="no-access">
                        <i class="fas fa-box-open"></i>
                        <h3>Próximamente cursos disponibles</h3>
                        <p>Estamos preparando contenido para ti</p>
                    </div>
                `;
                return;
            }

            let playlistsAMostrar = playlists;
            
            if (usuarioActual && usuarioActual.playlists) {
                if (!usuarioActual.playlists.includes('all')) {
                    playlistsAMostrar = playlists.filter(p => 
                        usuarioActual.playlists.includes(p.id)
                    );
                }
            }

            if (playlistsAMostrar.length === 0) {
                container.innerHTML = `
                    <div class="no-access">
                        <i class="fas fa-lock"></i>
                        <h3>No tienes acceso a estos cursos</h3>
                        <p>Adquiere un curso para obtener acceso</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="playlists-grid">';
            
            playlistsAMostrar.forEach(playlist => {
                const videosPlaylist = videos.filter(v => v.playlistId == playlist.id);
                const tieneAcceso = usuarioActual && (
                    usuarioActual.playlists?.includes('all') || 
                    usuarioActual.playlists?.includes(playlist.id)
                );
                
                // Calcular progreso
                let videosVistos = 0;
                let porcentaje = 0;
                if (usuarioActual && tieneAcceso) {
                    videosVistos = videosPlaylist.filter(v => progreso[usuarioActual.id]?.[v.id]).length;
                    porcentaje = Math.round((videosVistos / videosPlaylist.length) * 100) || 0;
                }
                
                // Calcular promedio de reseñas
                const promedio = calcularPromedio(playlist.id);
                const reseñasPlaylist = reseñas.filter(r => r.playlistId === playlist.id);
                
                let videosHtml = '';
                if (videosPlaylist.length === 0) {
                    videosHtml = '<p style="color:rgba(255,255,255,0.3); text-align:center; padding:20px;">Próximamente videos</p>';
                } else {
                    videosPlaylist.forEach(video => {
                        const visto = progreso[usuarioActual?.id]?.[video.id] ? 'watched' : '';
                        
                        let thumbnail = video.thumbnail;
                        if (!thumbnail && video.tipo === 'youtube') {
                            const match = video.url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                            const videoId = match ? match[1] : '';
                            thumbnail = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                        } else if (!thumbnail) {
                            thumbnail = 'https://images.unsplash.com/photo-1574717024453-354056af4e7f?w=320&h=180&fit=crop';
                        }
                        
                        videosHtml += `
                            <div class="video-item ${visto}" data-video-id="${video.id}" onclick="${tieneAcceso ? `reproducirVideo('${video.id}')` : 'alert(\'🔒 Adquiere el curso para ver los videos\')'}">
                                <div class="video-thumbnail">
                                    <img src="${thumbnail}" alt="${video.titulo}">
                                    <i class="fas fa-play-circle"></i>
                                </div>
                                <div class="video-info">
                                    <h4>${video.titulo}</h4>
                                    <div class="video-meta">
                                        <span><i class="fas fa-clock"></i> ${video.duracion || '—'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `
                    <div class="playlist-card">
                        <div class="playlist-image">
                            ${playlist.imagen ? 
                                `<img src="${playlist.imagen}" alt="${playlist.nombre}">` : 
                                `<i class="fas fa-image"></i>`
                            }
                        </div>
                        <div class="playlist-header">
                            <h3>${playlist.nombre || 'Sin nombre'}</h3>
                            <p>${playlist.descripcion || ''}</p>
                            <div class="playlist-meta">
                                <span><i class="fas fa-video"></i> ${videosPlaylist.length} videos</span>
                                <span><i class="fas fa-star"></i> ${promedio} (${reseñasPlaylist.length})</span>
                            </div>
                            <div class="playlist-price">
                                ${playlist.precio || 'Gratis'}
                                ${playlist.precio && playlist.precio !== 'Gratis' ? '<small>USD</small>' : ''}
                            </div>
                            
                            ${tieneAcceso ? `
                                <div class="progress-text" data-playlist="${playlist.id}">
                                    ${videosVistos}/${videosPlaylist.length} videos
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" data-playlist="${playlist.id}" style="width: ${porcentaje}%"></div>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="video-list">
                            ${videosHtml}
                        </div>
                        
                        ${!tieneAcceso && playlist.precio && playlist.precio !== 'Gratis' ? `
                            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(WHATSAPP_MESSAGE + playlist.nombre)}" 
                               target="_blank" 
                               class="btn-whatsapp">
                                <i class="fab fa-whatsapp"></i> Comprar por WhatsApp
                            </a>
                        ` : ''}
                        
                        ${tieneAcceso ? `
                            <div class="action-buttons">
                                <button class="btn-review" onclick="abrirModalReview('${playlist.id}')">
                                    <i class="fas fa-star"></i> Reseñar
                                </button>
                                ${porcentaje === 100 ? `
                                    <button class="btn-certificate" onclick="generarCertificado('${playlist.id}', '${playlist.nombre}')">
                                        <i class="fas fa-certificate"></i> Certificado
                                    </button>
                                ` : ''}
                            </div>
                        ` : ''}
                        
                        <!-- Sección de reseñas -->
                        ${reseñasPlaylist.length > 0 ? `
                            <div class="reviews-section">
                                <div class="reviews-header">
                                    <h4>Reseñas</h4>
                                    <div class="average-rating">
                                        <div class="stars">
                                            ${Array(5).fill().map((_, i) => 
                                                i < Math.round(promedio) ? 
                                                '<i class="fas fa-star"></i>' : 
                                                '<i class="far fa-star"></i>'
                                            ).join('')}
                                        </div>
                                        <span>${promedio}</span>
                                    </div>
                                </div>
                                ${reseñasPlaylist.slice(0, 2).map(r => `
                                    <div class="review-item">
                                        <div class="review-header">
                                            <span class="review-author">${r.userName}</span>
                                            <span class="review-date">${r.date}</span>
                                        </div>
                                        <div class="review-stars">
                                            ${Array(5).fill().map((_, i) => 
                                                i < r.rating ? 
                                                '<i class="fas fa-star"></i>' : 
                                                '<i class="far fa-star"></i>'
                                            ).join('')}
                                        </div>
                                        <div class="review-text">${r.text}</div>
                                    </div>
                                `).join('')}
                                ${reseñasPlaylist.length > 2 ? `
                                    <button class="btn-review" style="width:100%; margin-top:10px;" onclick="alert('Ver todas las reseñas (${reseñasPlaylist.length})')">
                                        Ver todas las reseñas (${reseñasPlaylist.length})
                                    </button>
                                ` : ''}
                            </div>
                        ` : tieneAcceso ? `
                            <div class="reviews-section" style="text-align:center; padding:15px;">
                                <p style="color:rgba(255,255,255,0.4); margin-bottom:10px;">Sé el primero en reseñar</p>
                                <button class="btn-review" onclick="abrirModalReview('${playlist.id}')">
                                    <i class="fas fa-star"></i> Escribir reseña
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // ================================================
        // REPRODUCIR VIDEO (ACTUALIZADO)
        // ================================================
        
        function reproducirVideo(videoId) {
            const video = videos.find(v => v.id == videoId);
            if (!video) return;
            
            videoActual = video;

            const container = document.getElementById('videoPlayerContainer');
            const titleEl = document.getElementById('currentVideoTitle');

            if (video.tipo === 'youtube') {
                const match = video.url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                const videoId = match ? match[1] : '';
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            } else if (video.tipo === 'supabase') {
                container.innerHTML = `<video src="${video.url}" controls autoplay style="width:100%;height:100%;"></video>`;
            }

            titleEl.textContent = video.titulo;
            document.getElementById('videoPlayerModal').classList.add('active');
        }

        function cerrarVideoPlayer() {
            document.getElementById('videoPlayerModal').classList.remove('active');
            document.getElementById('videoPlayerContainer').innerHTML = '';
        }

        // ================================================
        // INICIALIZACIÓN
        // ================================================
        
        document.addEventListener('DOMContentLoaded', () => {
            // Cargar datos de localStorage
            playlists = JSON.parse(localStorage.getItem('playlists')) || [];
            videos = JSON.parse(localStorage.getItem('videos')) || [];
            usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            progreso = JSON.parse(localStorage.getItem('progreso')) || {};
            reseñas = JSON.parse(localStorage.getItem('reseñas')) || [];

            // Verificar usuario actual
            try {
                const sesion = sessionStorage.getItem('usuario_actual');
                if (sesion) {
                    usuarioActual = JSON.parse(sesion);
                }
            } catch(e) {
                sessionStorage.removeItem('usuario_actual');
            }

            actualizarBoton();
            renderizarContenido();

            // Cerrar modales con Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
                }
            });

            // Exponer funciones globales
            window.abrirModalLogin = abrirModalLogin;
            window.iniciarSesion = iniciarSesion;
            window.cerrarSesion = cerrarSesion;
            window.reproducirVideo = reproducirVideo;
            window.cerrarVideoPlayer = cerrarVideoPlayer;
            window.cerrarModal = cerrarModal;
            window.marcarVideoComoVisto = marcarVideoComoVisto;
            window.guardarResena = guardarResena;
            window.abrirModalReview = abrirModalReview;
            window.generarCertificado = generarCertificado;
            window.setRating = setRating;
            window.togglePassword = togglePassword;
            window.conectarSupabase = conectarSupabase;
        });
    </script>
</body>
</html>
