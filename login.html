<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Adrián Reyes Crea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#050505',
                        cardDark: '#0a0a0a',
                        neonPurple: '#7000ff',
                        neonBlue: '#00f2ff',
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-white h-screen flex items-center justify-center p-6 overflow-hidden">
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-neonPurple/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md gamer-card p-10 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-orbitron font-black tracking-widest uppercase mb-2">ACCESS <span class="text-neonPurple">GRANTED</span></h1>
            <p class="text-white/40 text-[10px] font-bold tracking-[0.3em] uppercase">Enter your credentials</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black tracking-widest uppercase text-white/60">Identifier</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/20"></i>
                    <input type="text" id="username" class="w-full bg-white/5 border border-white/10 p-4 pl-12 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium" placeholder="USERNAME">
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black tracking-widest uppercase text-white/60">Security Key</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/20"></i>
                    <input type="password" id="password" class="w-full bg-white/5 border border-white/10 p-4 pl-12 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="gamer-btn w-full !py-4 mt-4">INITIALIZE SESSION</button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 flex justify-between items-center">
            <a href="index.html" class="text-[10px] font-black tracking-widest uppercase text-white/40 hover:text-white flex items-center">
                <i data-lucide="chevron-left" class="w-3 h-3 mr-1"></i>
                Back to base
            </a>
            <span class="text-[8px] font-bold text-white/10 tracking-widest">SECURE_LINK_V2.0</span>
        </div>
    </div>

    <script src="js/db-mock.js"></script>
    <script src="js/supabase-service.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const user = await DB_SERVICE.authenticate(u, p);
            
            if (user) {
                localStorage.setItem('arc_current_user', JSON.stringify(user));
                window.location.href = 'admin.html';
            } else {
                alert("ACCESS DENIED: Invalid Credentials");
            }
        });
    </script>
</body>
</html>
