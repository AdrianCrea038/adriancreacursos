<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | Adrian Reyes Crea</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/gamer-effects.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-container"><div class="auth-box">
<img src="assets/logo.png" alt="Logo" style="height:60px;margin-bottom:20px" onerror="this.style.opacity='0.5'"><h2>ACCESO USUARIOS</h2>
<form id="loginForm"><div class="form-group"><input type="text" id="username" class="gamer-input" required><label>Usuario</label></div>
<div class="form-group"><div class="password-wrapper" style="position:relative"><input type="password" id="password" class="gamer-input" required><label>Contraseña</label><button type="button" class="password-toggle" id="togglePassword" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer"><i class="fas fa-eye"></i></button></div></div>
<button type="submit" class="btn btn-primary" style="width:100%">Entrar</button></form>
<p id="loginError" style="color:#ff0055;margin-top:15px;display:none">Credenciales incorrectas</p>
<p style="margin-top:20px;font-size:0.9rem;color:#666"><a href="index.html" style="color:var(--primary-color)">← Volver al inicio</a></p>
</div></div>
<script src="js/database.js"></script><script src="js/auth.js"></script><script>
const toggle=document.getElementById('togglePassword'),pass=document.getElementById('password');if(toggle&&pass){toggle.addEventListener('click',function(){const t=pass.type==='password'?'text':'password';pass.setAttribute('type',t);this.querySelector('i').classList.toggle('fa-eye');this.querySelector('i').classList.toggle('fa-eye-slash');});}
</script></body></html>
