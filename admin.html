<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Adrián Reyes Crea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#050505',
                        cardDark: '#0a0a0a',
                        neonPurple: '#7000ff',
                        neonBlue: '#00f2ff',
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-white font-sans antialiased flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-cardDark border-r border-white/5 flex flex-col shrink-0">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-xl font-orbitron font-black tracking-widest uppercase">CORE_<span class="text-neonPurple">ADMIN</span></h1>
            <p class="text-[8px] font-bold text-white/20 tracking-[0.4em] uppercase mt-2">Operational System v2.0</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-2">
            <button onclick="showSection('dashboard')" class="nav-link w-full flex items-center space-x-3 p-4 bg-neonPurple/10 text-neonPurple font-bold uppercase text-[10px] tracking-widest transition-all" id="nav-dashboard">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                <span>Status</span>
            </button>
            <button onclick="showSection('home-editor')" class="nav-link w-full flex items-center space-x-3 p-4 text-white/40 hover:text-white font-bold uppercase text-[10px] tracking-widest transition-all" id="nav-home-editor">
                <i data-lucide="home" class="w-4 h-4"></i>
                <span>Hero Config</span>
            </button>
            <button onclick="showSection('projects')" class="nav-link w-full flex items-center space-x-3 p-4 text-white/40 hover:text-white font-bold uppercase text-[10px] tracking-widest transition-all" id="nav-projects">
                <i data-lucide="folder-kanban" class="w-4 h-4"></i>
                <span>Quests</span>
            </button>
            <button onclick="showSection('courses')" class="nav-link w-full flex items-center space-x-3 p-4 text-white/40 hover:text-white font-bold uppercase text-[10px] tracking-widest transition-all" id="nav-courses">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                <span>Academy</span>
            </button>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center space-x-3 p-4 text-red-500/60 hover:text-red-500 font-bold uppercase text-[10px] tracking-widest transition-all">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Terminate session</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-12 relative">
        <div class="absolute top-0 right-0 p-12 opacity-5 pointer-events-none">
            <i data-lucide="shield-check" class="w-64 h-64"></i>
        </div>

        <!-- Dashboard -->
        <section id="section-dashboard" class="admin-section space-y-12">
            <header>
                <h2 class="text-4xl font-orbitron font-black uppercase tracking-tighter">System <span class="text-neonPurple">Status</span></h2>
                <p class="text-white/40 text-xs font-bold tracking-widest uppercase mt-2">Real-time platform metrics</p>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="gamer-card p-8">
                    <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-4">Missions</p>
                    <p class="text-5xl font-orbitron font-black text-neonPurple" id="stat-projects">0</p>
                </div>
                <div class="gamer-card p-8">
                    <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-4">Skill Courses</p>
                    <p class="text-5xl font-orbitron font-black text-neonBlue" id="stat-courses">0</p>
                </div>
                <div class="gamer-card p-8">
                    <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-4">Active Players</p>
                    <p class="text-5xl font-orbitron font-black text-white" id="stat-users">0</p>
                </div>
                <div class="gamer-card p-8">
                    <p class="text-[10px] font-black text-neonPurple uppercase tracking-widest mb-4">Security</p>
                    <p class="text-2xl font-orbitron font-black text-green-500 uppercase">ENCRYPTED</p>
                </div>
            </div>
        </section>

        <!-- Hero Editor -->
        <section id="section-home-editor" class="admin-section hidden space-y-12">
            <header>
                <h2 class="text-4xl font-orbitron font-black uppercase tracking-tighter">Hero <span class="text-neonPurple">Config</span></h2>
            </header>
            <div class="gamer-card p-10 max-w-2xl">
                <form id="banner-form" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black tracking-widest uppercase text-white/40">Visual Asset (URL)</label>
                        <input type="text" id="banner-url" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black tracking-widest uppercase text-white/40">Primary Heading</label>
                        <input type="text" id="banner-title" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black tracking-widest uppercase text-white/40">Subheading</label>
                        <input type="text" id="banner-subtitle" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black tracking-widest uppercase text-white/40">Description</label>
                        <textarea id="banner-description" rows="3" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium"></textarea>
                    </div>
                    <button type="submit" class="gamer-btn !py-4 w-full">Apply Changes</button>
                </form>
            </div>
        </section>

        <!-- Projects -->
        <section id="section-projects" class="admin-section hidden space-y-12">
            <header class="flex items-center justify-between">
                <h2 class="text-4xl font-orbitron font-black uppercase tracking-tighter">Mission <span class="text-neonPurple">Control</span></h2>
                <button onclick="toggleModal('project-modal')" class="gamer-btn !py-3 flex items-center space-x-2">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>New Quest</span>
                </button>
            </header>
            <div id="admin-projects-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Loaded via JS -->
            </div>
        </section>

        <!-- Courses -->
        <section id="section-courses" class="admin-section hidden space-y-12">
            <header class="flex items-center justify-between">
                <h2 class="text-4xl font-orbitron font-black uppercase tracking-tighter">Academy <span class="text-neonPurple">Courses</span></h2>
                <button onclick="toggleModal('course-modal')" class="gamer-btn !py-3 flex items-center space-x-2">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>New Course</span>
                </button>
            </header>
            <div id="admin-courses-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Loaded via JS -->
            </div>
        </section>
    </main>

    <!-- Project Modal -->
    <div id="project-modal" class="fixed inset-0 z-50 hidden bg-bgDark/95 backdrop-blur-md flex items-center justify-center p-6">
        <div class="gamer-card w-full max-w-xl p-10">
            <h3 class="text-2xl font-orbitron font-black uppercase mb-10 tracking-widest">Deploy <span class="text-neonPurple">Mission</span></h3>
            <form id="project-form" class="space-y-6">
                <input type="text" id="proj-title" placeholder="QUEST_NAME" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <input type="text" id="proj-category" placeholder="QUEST_TYPE" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <input type="text" id="proj-url" placeholder="ASSET_URL" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <textarea id="proj-desc" placeholder="MISSION_DESCRIPTION" rows="3" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium"></textarea>
                <input type="text" id="proj-icon" placeholder="ICON_NAME (e.g., palette, video, brain-circuit)" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <div class="flex space-x-4 pt-4">
                    <button type="submit" class="gamer-btn !py-4 flex-1">EXECUTE DEPLOY</button>
                    <button type="button" onclick="toggleModal('project-modal')" class="text-white/20 font-black uppercase text-[10px] tracking-widest px-8">ABORT</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Course Modal -->
    <div id="course-modal" class="fixed inset-0 z-50 hidden bg-bgDark/95 backdrop-blur-md flex items-center justify-center p-6">
        <div class="gamer-card w-full max-w-xl p-10">
            <h3 class="text-2xl font-orbitron font-black uppercase mb-10 tracking-widest">Add <span class="text-neonPurple">Course</span></h3>
            <form id="course-form" class="space-y-6">
                <input type="text" id="course-title" placeholder="COURSE_TITLE" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <input type="number" id="course-price" placeholder="PRICE (USD)" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <textarea id="course-desc" placeholder="COURSE_DESCRIPTION" rows="3" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium"></textarea>
                <input type="text" id="course-preview-url" placeholder="PREVIEW_IMAGE_URL" class="w-full bg-white/5 border border-white/10 p-4 focus:outline-none focus:border-neonPurple transition-all text-sm font-medium">
                <div class="flex space-x-4 pt-4">
                    <button type="submit" class="gamer-btn !py-4 flex-1">ADD COURSE</button>
                    <button type="button" onclick="toggleModal('course-modal')" class="text-white/20 font-black uppercase text-[10px] tracking-widest px-8">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Playlist Editor Modal -->
    <div id="playlist-modal" class="fixed inset-0 z-50 hidden bg-bgDark/95 backdrop-blur-md flex items-center justify-center p-6 overflow-y-auto">
        <div class="gamer-card w-full max-w-4xl p-8 my-10">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-orbitron font-black uppercase tracking-widest">Editor de <span class="text-neonPurple">Playlist</span></h3>
                <button onclick="toggleModal('playlist-modal')" class="text-white/40 hover:text-neonPurple">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="playlist-course-title" class="text-sm text-white/60 mb-6 font-mono"></div>
            
            <div id="playlist-items" class="space-y-4 mb-8 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Items de playlist se cargarán aquí -->
            </div>
            
            <div class="flex justify-between items-center pt-4 border-t border-white/10">
                <button onclick="addPlaylistItem()" class="flex items-center space-x-2 text-white/60 hover:text-neonPurple text-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Agregar Video</span>
                </button>
                <div class="flex space-x-4">
                    <button onclick="savePlaylist()" class="gamer-btn !py-3 !px-8">GUARDAR PLAYLIST</button>
                    <button onclick="toggleModal('playlist-modal')" class="text-white/40 hover:text-white text-sm uppercase tracking-widest">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/db-mock.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/admin.js"></script>
    <script>
        lucide.createIcons();
        if (!localStorage.getItem('arc_current_user')) window.location.href = 'login.html';
        function logout() {
            localStorage.removeItem('arc_current_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
