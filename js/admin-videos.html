<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Videos · Adrian Reyes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: #0A0A0F;
            color: white;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            border-bottom: 1px solid rgba(191, 255, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #BFFF00;
            background: rgba(191, 255, 0, 0.1);
        }

        .btn-logout {
            background: #FF4444;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            background: #FF6666;
            transform: translateY(-2px);
        }

        /* Header */
        .page-header {
            padding: 40px 0 20px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-sub {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            border-bottom: 1px solid rgba(191, 255, 0, 0.2);
            padding-bottom: 10px;
        }

        .admin-tab {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid rgba(191, 255, 0, 0.3);
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Rubik', sans-serif;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-tab:hover {
            background: rgba(191, 255, 0, 0.1);
            border-color: #BFFF00;
        }

        .admin-tab.active {
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            color: #0A0A0F;
            border-color: transparent;
        }

        .tab-panel {
            display: none;
            padding: 20px 0;
        }

        .tab-panel.active {
            display: block;
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #BFFF00;
        }

        .btn-primary {
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            color: #0A0A0F;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Rubik', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(191, 255, 0, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(191, 255, 0, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Rubik', sans-serif;
        }

        .btn-secondary:hover {
            border-color: #BFFF00;
            background: rgba(191, 255, 0, 0.1);
        }

        .btn-danger {
            background: rgba(255, 68, 68, 0.1);
            color: #FF6B6B;
            border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'Rubik', sans-serif;
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: #FF6B6B;
        }

        /* Grids */
        .playlists-grid, .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Playlist Card */
        .playlist-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(191, 255, 0, 0.15);
            border-radius: 16px;
            overflow: hidden;
        }

        .playlist-header {
            background: linear-gradient(145deg, rgba(191, 255, 0, 0.1), rgba(0, 255, 194, 0.05));
            padding: 20px;
            border-bottom: 1px solid rgba(191, 255, 0, 0.2);
        }

        .playlist-header h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .playlist-header p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .playlist-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            color: #BFFF00;
            font-size: 12px;
        }

        .video-list {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .video-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(191, 255, 0, 0.1);
        }

        .video-item:last-child {
            border-bottom: none;
        }

        .video-info {
            flex: 1;
        }

        .video-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .video-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
        }

        .video-actions button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .video-actions button:hover {
            color: #BFFF00;
            background: rgba(191, 255, 0, 0.1);
        }

        .video-actions button.delete:hover {
            color: #FF6B6B;
            background: rgba(255, 68, 68, 0.1);
        }

        .add-video-btn {
            width: 100%;
            padding: 12px;
            background: rgba(191, 255, 0, 0.05);
            border: 1px dashed rgba(191, 255, 0, 0.3);
            border-radius: 8px;
            color: #BFFF00;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-video-btn:hover {
            background: rgba(191, 255, 0, 0.1);
            border-color: #BFFF00;
        }

        /* User card */
        .user-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(191, 255, 0, 0.15);
            border-radius: 16px;
            padding: 20px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #0A0A0F;
        }

        .user-info h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .user-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .user-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .badge-admin {
            background: rgba(191, 255, 0, 0.1);
            color: #BFFF00;
            border: 1px solid rgba(191, 255, 0, 0.3);
        }

        .badge-editor {
            background: rgba(0, 255, 194, 0.1);
            color: #00FFC2;
            border: 1px solid rgba(0, 255, 194, 0.3);
        }

        .badge-student {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-playlists {
            margin: 15px 0;
            font-size: 13px;
        }

        .user-playlists span {
            color: #BFFF00;
            font-weight: 600;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: #1A1A1F;
            border: 1px solid #BFFF00;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #BFFF00, #00FFC2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(191, 255, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: 'Rubik', sans-serif;
            color: white;
            font-size: 14px;
        }

        .modal-field:focus {
            outline: none;
            border-color: #BFFF00;
        }

        .checkbox-group {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(191, 255, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(191, 255, 0, 0.1);
        }

        .checkbox-item:last-child {
            border-bottom: none;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #BFFF00;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        /* Video Preview */
        .video-preview {
            width: 100%;
            height: 200px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-preview iframe,
        .video-preview video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-preview i {
            font-size: 50px;
            color: rgba(191, 255, 0, 0.2);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1A1A1F;
            border: 1px solid #BFFF00;
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            font-size: 14px;
            z-index: 10002;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        .toast i {
            color: #BFFF00;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0%); opacity: 1; }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .admin-tabs {
                flex-direction: column;
            }
            .playlists-grid, .users-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo" onclick="window.location.href='index.html'">Admin Videos</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Inicio</a>
                <a href="cursos.html" class="nav-link"><i class="fas fa-graduation-cap"></i> Cursos</a>
                <a href="admin-videos.html" class="nav-link active"><i class="fas fa-video"></i> Admin Videos</a>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Administración de Contenido</h1>
            <p class="page-sub">Gestiona las playlists, videos y permisos de usuarios</p>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="cambiarTab('playlists')">
                <i class="fas fa-list"></i> Playlists
            </button>
            <button class="admin-tab" onclick="cambiarTab('usuarios')">
                <i class="fas fa-users"></i> Usuarios
            </button>
        </div>

        <!-- Panel de Playlists -->
        <div class="tab-panel active" id="panelPlaylists">
            <div class="section-header">
                <h2><i class="fas fa-film"></i> Playlists de Videos</h2>
                <button class="btn-primary" onclick="abrirModalPlaylist()">
                    <i class="fas fa-plus"></i> Nueva Playlist
                </button>
            </div>
            <div class="playlists-grid" id="playlistsGrid"></div>
        </div>

        <!-- Panel de Usuarios -->
        <div class="tab-panel" id="panelUsuarios">
            <div class="section-header">
                <h2><i class="fas fa-user-plus"></i> Usuarios del Sistema</h2>
                <button class="btn-primary" onclick="abrirModalUsuario()">
                    <i class="fas fa-plus"></i> Nuevo Usuario
                </button>
            </div>
            <div class="users-grid" id="usersGrid"></div>
        </div>
    </div>

    <!-- Modal Playlist (ACTUALIZADO con imagen y precio) -->
    <div class="modal" id="modalPlaylist">
        <div class="modal-card">
            <button class="modal-close" onclick="cerrarModal('modalPlaylist')">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title" id="playlistModalTitle">Nueva Playlist</h3>
            <input type="hidden" id="playlistId">
            
            <input type="text" class="modal-field" id="playlistNombre" placeholder="Nombre de la playlist *">
            <textarea class="modal-field" id="playlistDescripcion" placeholder="Descripción de la playlist" rows="3"></textarea>
            <input type="url" class="modal-field" id="playlistImagen" placeholder="URL de la miniatura (imagen)">
            <input type="text" class="modal-field" id="playlistPrecio" placeholder="Precio (ej: $49.99 USD o 'Gratis')">
            
            <div class="modal-actions">
                <button class="btn-secondary" onclick="cerrarModal('modalPlaylist')">Cancelar</button>
                <button class="btn-primary" onclick="guardarPlaylist()">Guardar Playlist</button>
            </div>
        </div>
    </div>

    <!-- Modal Video -->
    <div class="modal" id="modalVideo">
        <div class="modal-card">
            <button class="modal-close" onclick="cerrarModal('modalVideo')">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title" id="videoModalTitle">Agregar Video</h3>
            <input type="hidden" id="videoId">
            <input type="hidden" id="videoPlaylistId">
            
            <input type="text" class="modal-field" id="videoTitulo" placeholder="Título del video *">
            <input type="text" class="modal-field" id="videoSeccion" placeholder="Sección / Módulo">
            <input type="text" class="modal-field" id="videoDuracion" placeholder="Duración (ej: 15:30)">
            
            <select class="modal-field" id="videoTipo" onchange="actualizarPreview()">
                <option value="youtube">YouTube</option>
                <option value="vimeo">Vimeo</option>
                <option value="cloudinary">Cloudinary</option>
            </select>
            
            <input type="url" class="modal-field" id="videoUrl" placeholder="URL del video *" oninput="actualizarPreview()">
            
            <div class="video-preview" id="videoPreview">
                <i class="fas fa-video"></i>
            </div>
            
            <textarea class="modal-field" id="videoDescripcion" placeholder="Descripción del video" rows="3"></textarea>
            
            <div class="modal-actions">
                <button class="btn-secondary" onclick="cerrarModal('modalVideo')">Cancelar</button>
                <button class="btn-primary" onclick="guardarVideo()">Guardar Video</button>
            </div>
        </div>
    </div>

    <!-- Modal Usuario -->
    <div class="modal" id="modalUsuario">
        <div class="modal-card">
            <button class="modal-close" onclick="cerrarModal('modalUsuario')">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="modal-title" id="usuarioModalTitle">Nuevo Usuario</h3>
            <input type="hidden" id="usuarioId">
            
            <input type="text" class="modal-field" id="usuarioNombre" placeholder="Nombre completo *">
            <input type="text" class="modal-field" id="usuarioLogin" placeholder="Nombre de usuario *">
            <input type="password" class="modal-field" id="usuarioPass" placeholder="Contraseña *">
            <input type="email" class="modal-field" id="usuarioEmail" placeholder="Correo electrónico">
            
            <select class="modal-field" id="usuarioRol">
                <option value="admin">Administrador</option>
                <option value="editor">Editor</option>
                <option value="student">Estudiante</option>
            </select>
            
            <div>
                <label style="color: #BFFF00; margin-bottom: 10px; display: block;">
                    <i class="fas fa-lock-open"></i> Playlists a las que tiene acceso:
                </label>
                <div class="checkbox-group" id="playlistsCheckboxGroup"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-secondary" onclick="cerrarModal('modalUsuario')">Cancelar</button>
                <button class="btn-primary" onclick="guardarUsuario()">Guardar Usuario</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================
        // VARIABLES GLOBALES
        // ================================================
        
        let playlists = JSON.parse(localStorage.getItem('playlists')) || [];
        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

        // Asegurar que existe el admin
        let adminEncontrado = usuarios.find(u => u.login === 'adrian');
        if (!adminEncontrado) {
            usuarios.push({
                id: 1,
                nombre: "Adrian Reyes",
                login: "adrian",
                pass: "admin123",
                email: "adrian@adriancreativo.com",
                rol: "admin",
                playlists: ['all']
            });
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
        }

        // ================================================
        // VERIFICAR ACCESO ADMIN
        // ================================================
        function verificarAcceso() {
            const adminLogged = sessionStorage.getItem('admin_logged');
            if (adminLogged !== 'true') {
                window.location.href = 'admin-login.html';
            }
        }

        function cerrarSesion() {
            sessionStorage.removeItem('admin_logged');
            window.location.href = 'index.html';
        }

        function cambiarTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'playlists') {
                document.querySelectorAll('.admin-tab')[0].classList.add('active');
                document.getElementById('panelPlaylists').classList.add('active');
                renderizarPlaylists();
            } else {
                document.querySelectorAll('.admin-tab')[1].classList.add('active');
                document.getElementById('panelUsuarios').classList.add('active');
                renderizarUsuarios();
            }
        }

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icono = tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icono}"></i> ${mensaje}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function cerrarModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ================================================
        // FUNCIONES DE PLAYLISTS (ACTUALIZADAS)
        // ================================================
        function renderizarPlaylists() {
            const grid = document.getElementById('playlistsGrid');
            if (!grid) return;
            
            if (playlists.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px;">
                        <i class="fas fa-list" style="font-size: 60px; color: rgba(191,255,0,0.2); margin-bottom: 20px;"></i>
                        <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">No hay playlists creadas</p>
                        <button class="btn-primary" onclick="abrirModalPlaylist()">
                            <i class="fas fa-plus"></i> Crear primera playlist
                        </button>
                    </div>
                `;
                return;
            }
            
            let html = '';
            playlists.forEach(playlist => {
                const videosPlaylist = videos.filter(v => v.playlistId === playlist.id);
                
                let videosHtml = '';
                if (videosPlaylist.length === 0) {
                    videosHtml = '<p style="color:rgba(255,255,255,0.4); padding:10px; text-align:center;">Sin videos</p>';
                } else {
                    videosPlaylist.forEach(video => {
                        videosHtml += `
                            <div class="video-item">
                                <div class="video-info">
                                    <h4>${video.titulo}</h4>
                                    <p>
                                        <span><i class="fas fa-clock"></i> ${video.duracion || '—'}</span>
                                        <span><i class="fas fa-tag"></i> ${video.seccion || 'General'}</span>
                                    </p>
                                </div>
                                <div class="video-actions">
                                    <button onclick="editarVideo('${video.id}')"><i class="fas fa-edit"></i></button>
                                    <button class="delete" onclick="eliminarVideo('${video.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `
                    <div class="playlist-card">
                        <div class="playlist-header">
                            <h3>${playlist.nombre || 'Sin nombre'}</h3>
                            <p>${playlist.descripcion || ''}</p>
                            <div class="playlist-stats">
                                <span><i class="fas fa-video"></i> ${videosPlaylist.length} videos</span>
                                ${playlist.precio ? `<span><i class="fas fa-tag"></i> ${playlist.precio}</span>` : ''}
                            </div>
                        </div>
                        <div class="video-list">
                            ${videosHtml}
                            <button class="add-video-btn" onclick="abrirModalVideo('${playlist.id}')">
                                <i class="fas fa-plus"></i> Agregar video
                            </button>
                        </div>
                        <div style="padding:15px; border-top:1px solid rgba(191,255,0,0.1); display:flex; gap:10px;">
                            <button class="btn-secondary" style="flex:1" onclick="editarPlaylist('${playlist.id}')">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            <button class="btn-danger" style="flex:1" onclick="eliminarPlaylist('${playlist.id}')">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        window.abrirModalPlaylist = function(id = null) {
            if (id) {
                const playlist = playlists.find(p => p.id == id);
                if (playlist) {
                    document.getElementById('playlistModalTitle').innerText = 'Editar Playlist';
                    document.getElementById('playlistId').value = playlist.id;
                    document.getElementById('playlistNombre').value = playlist.nombre || '';
                    document.getElementById('playlistDescripcion').value = playlist.descripcion || '';
                    document.getElementById('playlistImagen').value = playlist.imagen || '';
                    document.getElementById('playlistPrecio').value = playlist.precio || '';
                }
            } else {
                document.getElementById('playlistModalTitle').innerText = 'Nueva Playlist';
                document.getElementById('playlistId').value = '';
                document.getElementById('playlistNombre').value = '';
                document.getElementById('playlistDescripcion').value = '';
                document.getElementById('playlistImagen').value = '';
                document.getElementById('playlistPrecio').value = '';
            }
            document.getElementById('modalPlaylist').classList.add('active');
        };

        window.editarPlaylist = function(id) {
            abrirModalPlaylist(id);
        };

        window.guardarPlaylist = function() {
            const id = document.getElementById('playlistId').value;
            const nombre = document.getElementById('playlistNombre').value.trim();
            
            if (!nombre) {
                mostrarToast('❌ El nombre de la playlist es requerido', 'error');
                return;
            }
            
            const playlistData = {
                id: id || Date.now().toString(),
                nombre: nombre,
                descripcion: document.getElementById('playlistDescripcion').value.trim(),
                imagen: document.getElementById('playlistImagen').value.trim(),
                precio: document.getElementById('playlistPrecio').value.trim() || 'Gratis',
                fechaCreacion: new Date().toISOString()
            };
            
            if (id) {
                const index = playlists.findIndex(p => p.id == id);
                playlists[index] = { ...playlists[index], ...playlistData };
                mostrarToast('✅ Playlist actualizada');
            } else {
                playlists.push(playlistData);
                mostrarToast('✅ Playlist creada');
            }
            
            localStorage.setItem('playlists', JSON.stringify(playlists));
            cerrarModal('modalPlaylist');
            renderizarPlaylists();
        };

        window.eliminarPlaylist = function(id) {
            if (!confirm('¿Eliminar esta playlist y todos sus videos?')) return;
            playlists = playlists.filter(p => p.id != id);
            videos = videos.filter(v => v.playlistId != id);
            localStorage.setItem('playlists', JSON.stringify(playlists));
            localStorage.setItem('videos', JSON.stringify(videos));
            mostrarToast('✅ Playlist eliminada');
            renderizarPlaylists();
        };

        // ================================================
        // FUNCIONES DE VIDEOS
        // ================================================
        window.abrirModalVideo = function(playlistId) {
            const playlist = playlists.find(p => p.id == playlistId);
            document.getElementById('videoModalTitle').innerText = `Agregar Video a "${playlist?.nombre || 'Playlist'}"`;
            document.getElementById('videoId').value = '';
            document.getElementById('videoPlaylistId').value = playlistId;
            document.getElementById('videoTitulo').value = '';
            document.getElementById('videoSeccion').value = '';
            document.getElementById('videoDuracion').value = '';
            document.getElementById('videoTipo').value = 'youtube';
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoDescripcion').value = '';
            document.getElementById('videoPreview').innerHTML = '<i class="fas fa-video"></i>';
            document.getElementById('modalVideo').classList.add('active');
        };

        window.editarVideo = function(videoId) {
            const video = videos.find(v => v.id === videoId);
            if (!video) return;
            
            document.getElementById('videoModalTitle').innerText = 'Editar Video';
            document.getElementById('videoId').value = video.id;
            document.getElementById('videoPlaylistId').value = video.playlistId;
            document.getElementById('videoTitulo').value = video.titulo;
            document.getElementById('videoSeccion').value = video.seccion || '';
            document.getElementById('videoDuracion').value = video.duracion || '';
            document.getElementById('videoTipo').value = video.tipo || 'youtube';
            document.getElementById('videoUrl').value = video.url || '';
            document.getElementById('videoDescripcion').value = video.descripcion || '';
            actualizarPreview();
            document.getElementById('modalVideo').classList.add('active');
        };

        function actualizarPreview() {
            const url = document.getElementById('videoUrl').value.trim();
            const tipo = document.getElementById('videoTipo').value;
            const preview = document.getElementById('videoPreview');
            
            if (!url) {
                preview.innerHTML = '<i class="fas fa-video"></i>';
                return;
            }

            if (tipo === 'youtube') {
                const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                const videoId = match ? match[1] : '';
                if (videoId) {
                    preview.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    preview.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#FF6B6B;"></i>';
                }
            } else if (tipo === 'vimeo') {
                const match = url.match(/(?:vimeo\.com\/|player\.vimeo\.com\/video\/)(\d+)/);
                const videoId = match ? match[1] : '';
                if (videoId) {
                    preview.innerHTML = `<iframe src="https://player.vimeo.com/video/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    preview.innerHTML = '<i class="fas fa-exclamation-circle" style="color:#FF6B6B;"></i>';
                }
            } else if (tipo === 'cloudinary') {
                preview.innerHTML = `<video src="${url}" controls style="width:100%;height:100%;"></video>`;
            }
        }

        window.guardarVideo = function() {
            const id = document.getElementById('videoId').value;
            const playlistId = document.getElementById('videoPlaylistId').value;
            const titulo = document.getElementById('videoTitulo').value.trim();
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!titulo || !url) {
                mostrarToast('❌ Título y URL son requeridos', 'error');
                return;
            }
            
            const videoData = {
                id: id || Date.now().toString(),
                playlistId,
                titulo: titulo,
                seccion: document.getElementById('videoSeccion').value.trim() || 'General',
                duracion: document.getElementById('videoDuracion').value.trim(),
                tipo: document.getElementById('videoTipo').value,
                url: url,
                descripcion: document.getElementById('videoDescripcion').value.trim(),
                fechaAgregado: new Date().toISOString()
            };
            
            if (id) {
                const index = videos.findIndex(v => v.id === id);
                videos[index] = videoData;
                mostrarToast('✅ Video actualizado');
            } else {
                videos.push(videoData);
                mostrarToast('✅ Video agregado');
            }
            
            localStorage.setItem('videos', JSON.stringify(videos));
            cerrarModal('modalVideo');
            renderizarPlaylists();
        };

        window.eliminarVideo = function(videoId) {
            if (!confirm('¿Eliminar este video?')) return;
            videos = videos.filter(v => v.id !== videoId);
            localStorage.setItem('videos', JSON.stringify(videos));
            mostrarToast('✅ Video eliminado');
            renderizarPlaylists();
        };

        // ================================================
        // FUNCIONES DE USUARIOS
        // ================================================
        function renderizarUsuarios() {
            const grid = document.getElementById('usersGrid');
            if (!grid) return;
            
            if (usuarios.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">No hay usuarios creados</div>';
                return;
            }
            
            let html = '';
            usuarios.forEach(usuario => {
                const badgeClass = usuario.rol === 'admin' ? 'badge-admin' : 
                                  usuario.rol === 'editor' ? 'badge-editor' : 'badge-student';
                const rolTexto = usuario.rol === 'admin' ? 'Administrador' : 
                                usuario.rol === 'editor' ? 'Editor' : 'Estudiante';
                
                let playlistsAcceso = 'Sin acceso';
                if (usuario.playlists && usuario.playlists.length > 0) {
                    if (usuario.playlists.includes('all')) {
                        playlistsAcceso = 'Todas las playlists';
                    } else {
                        const nombres = playlists
                            .filter(p => usuario.playlists.includes(p.id))
                            .map(p => p.nombre)
                            .join(', ');
                        playlistsAcceso = nombres || 'Playlists específicas';
                    }
                }
                
                html += `
                    <div class="user-card">
                        <div class="user-header">
                            <div class="user-avatar">${usuario.nombre.charAt(0)}</div>
                            <div class="user-info">
                                <h3>${usuario.nombre}</h3>
                                <p>@${usuario.login}</p>
                            </div>
                        </div>
                        <div class="user-badge ${badgeClass}">${rolTexto}</div>
                        <div class="user-playlists">
                            <i class="fas fa-list" style="color:#BFFF00;"></i> 
                            <span>Acceso:</span> ${playlistsAcceso}
                        </div>
                        <div class="user-actions">
                            <button class="btn-secondary" onclick="editarUsuario('${usuario.id}')">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            ${usuario.id !== 1 ? `
                                <button class="btn-danger" onclick="eliminarUsuario('${usuario.id}')">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        window.abrirModalUsuario = function(id = null) {
            if (id) {
                const usuario = usuarios.find(u => u.id == id);
                if (usuario) {
                    document.getElementById('usuarioModalTitle').innerText = 'Editar Usuario';
                    document.getElementById('usuarioId').value = usuario.id;
                    document.getElementById('usuarioNombre').value = usuario.nombre;
                    document.getElementById('usuarioLogin').value = usuario.login;
                    document.getElementById('usuarioPass').value = '';
                    document.getElementById('usuarioEmail').value = usuario.email || '';
                    document.getElementById('usuarioRol').value = usuario.rol || 'student';
                    renderizarCheckboxPlaylists(usuario.playlists || []);
                }
            } else {
                document.getElementById('usuarioModalTitle').innerText = 'Nuevo Usuario';
                document.getElementById('usuarioId').value = '';
                document.getElementById('usuarioNombre').value = '';
                document.getElementById('usuarioLogin').value = '';
                document.getElementById('usuarioPass').value = '';
                document.getElementById('usuarioEmail').value = '';
                document.getElementById('usuarioRol').value = 'student';
                renderizarCheckboxPlaylists([]);
            }
            document.getElementById('modalUsuario').classList.add('active');
        };

        window.editarUsuario = function(id) {
            abrirModalUsuario(id);
        };

        function renderizarCheckboxPlaylists(seleccionados = []) {
            const container = document.getElementById('playlistsCheckboxGroup');
            if (!container) return;
            
            if (playlists.length === 0) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.4);">No hay playlists creadas</p>';
                return;
            }
            
            let html = '';
            
            const checkedAll = seleccionados.includes('all') ? 'checked' : '';
            html += `
                <div class="checkbox-item">
                    <input type="checkbox" id="playlist_all" value="all" ${checkedAll} onchange="toggleAllPlaylists(this)">
                    <label for="playlist_all" style="color:#BFFF00; font-weight:600;">✦ Todas las playlists</label>
                </div>
            `;
            
            playlists.forEach(playlist => {
                const checked = seleccionados.includes('all') || seleccionados.includes(playlist.id) ? 'checked' : '';
                const disabled = seleccionados.includes('all') ? 'disabled' : '';
                html += `
                    <div class="checkbox-item">
                        <input type="checkbox" class="playlist-checkbox" value="${playlist.id}" ${checked} ${disabled}>
                        <label>${playlist.nombre}</label>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        window.toggleAllPlaylists = function(checkbox) {
            const checkboxes = document.querySelectorAll('.playlist-checkbox');
            checkboxes.forEach(cb => {
                cb.disabled = checkbox.checked;
                if (!checkbox.checked) {
                    cb.checked = false;
                }
            });
        };

        function getPlaylistsSeleccionadas() {
            const allCheckbox = document.getElementById('playlist_all');
            if (allCheckbox && allCheckbox.checked) {
                return ['all'];
            }
            
            const seleccionados = [];
            document.querySelectorAll('.playlist-checkbox:checked').forEach(cb => {
                seleccionados.push(cb.value);
            });
            return seleccionados;
        }

        window.guardarUsuario = function() {
            const id = document.getElementById('usuarioId').value;
            const nombre = document.getElementById('usuarioNombre').value.trim();
            const login = document.getElementById('usuarioLogin').value.trim();
            const pass = document.getElementById('usuarioPass').value.trim();
            const email = document.getElementById('usuarioEmail').value.trim();
            const rol = document.getElementById('usuarioRol').value;
            
            if (!nombre || !login || (!id && !pass)) {
                mostrarToast('❌ Nombre, usuario y contraseña son requeridos', 'error');
                return;
            }
            
            const playlistsPermisos = getPlaylistsSeleccionadas();
            
            const usuarioData = {
                id: id || Date.now().toString(),
                nombre,
                login,
                email,
                rol,
                playlists: playlistsPermisos
            };
            
            if (!id && pass) {
                usuarioData.pass = pass;
            } else if (id && pass) {
                usuarioData.pass = pass;
            } else if (id) {
                const existente = usuarios.find(u => u.id == id);
                if (existente) {
                    usuarioData.pass = existente.pass;
                }
            }
            
            if (id) {
                const index = usuarios.findIndex(u => u.id == id);
                usuarios[index] = { ...usuarios[index], ...usuarioData };
                mostrarToast('✅ Usuario actualizado');
            } else {
                usuarios.push(usuarioData);
                mostrarToast('✅ Usuario creado');
            }
            
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            cerrarModal('modalUsuario');
            renderizarUsuarios();
        };

        window.eliminarUsuario = function(id) {
            if (!confirm('¿Eliminar este usuario?')) return;
            usuarios = usuarios.filter(u => u.id != id);
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            mostrarToast('✅ Usuario eliminado');
            renderizarUsuarios();
        };

        // ================================================
        // INICIALIZACIÓN
        // ================================================
        document.addEventListener('DOMContentLoaded', function() {
            verificarAcceso();
            renderizarPlaylists();
            renderizarUsuarios();
            
            // Hacer funciones globales
            window.cambiarTab = cambiarTab;
            window.cerrarModal = cerrarModal;
            window.actualizarPreview = actualizarPreview;
        });
    </script>
</body>
</html>
