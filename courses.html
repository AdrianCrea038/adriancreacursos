<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos | Adrián Reyes Crea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#050505',
                        cardDark: '#0a0a0a',
                        neonPurple: '#7000ff',
                        neonBlue: '#00f2ff',
                        neonPink: '#ff00aa',
                        neonGreen: '#00ffaa',
                    },
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-white font-sans antialiased">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-bgDark/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-orbitron font-black tracking-widest text-white group">
                ADRIÁN <span class="text-neonPurple group-hover:text-neonBlue transition-colors">REYES</span> CREA
            </a>
            <div class="hidden md:flex items-center space-x-10 text-xs font-bold tracking-[0.2em]">
                <a href="index.html#home" class="hover:text-neonPurple transition-all">INICIO</a>
                <a href="index.html#servicios" class="hover:text-neonPurple transition-all">SERVICIOS</a>
                <a href="index.html#proyectos" class="hover:text-neonPurple transition-all">PROYECTOS</a>
                <a href="index.html#contacto" class="hover:text-neonPurple transition-all">CONTACTO</a>
                <a href="courses.html" class="gamer-btn !px-6 !py-2 !text-[10px]">CURSOS</a>
                <a href="login.html" class="flex items-center space-x-2 text-white/40 hover:text-white transition-all">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    <span>LOGIN</span>
                </a>
            </div>
            <button class="md:hidden text-white" id="menu-btn">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-40 pb-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-7xl font-orbitron font-black uppercase tracking-tighter neon-text">Academia Digital</h1>
            <p class="text-white/40 max-w-2xl mx-auto text-lg font-light mt-6">
                Aprende las técnicas más avanzadas de diseño y desarrollo web para crear productos que destaquen.
            </p>
        </div>
    </header>

    <!-- Courses List -->
    <main class="py-20">
        <div class="max-w-7xl mx-auto px-6">
            <div id="courses-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Courses will be loaded here from DB_MOCK -->
            </div>
        </div>
    </main>

    <!-- Course Preview Modal -->
    <div id="course-preview-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-bgDark/95 backdrop-blur-md" id="modal-overlay"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-5xl bg-cardDark border border-white/10 h-[90vh] overflow-hidden rounded-sm flex flex-col md:flex-row shadow-2xl">
            <!-- Left: Course Details & Video Preview -->
            <div class="flex-1 overflow-y-auto p-10 scrollbar-thin">
                <button id="close-modal" class="absolute top-6 right-6 text-white/40 hover:text-neonPurple">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <div id="modal-content">
                    <!-- Dynamic Preview Content -->
                </div>
            </div>
            
            <!-- Right: Buy / Playlist Info -->
            <div class="w-full md:w-80 bg-bgDark/80 border-l border-white/5 p-8 flex flex-col justify-between">
                <div>
                    <h3 class="text-xs font-orbitron font-bold tracking-widest text-neonPurple uppercase mb-6">Contenido del Curso</h3>
                    <ul id="modal-playlist" class="space-y-4 text-sm">
                        <!-- Playlist items here -->
                    </ul>
                </div>
                
                <div class="pt-8 border-t border-white/10 mt-8">
                    <div class="flex items-center justify-between mb-6">
                        <span class="text-white/40 text-sm">Precio del curso:</span>
                        <span id="modal-price" class="text-3xl font-orbitron font-bold text-neonBlue">$0.00</span>
                    </div>
                    <a id="buy-whatsapp-btn" href="#" class="w-full gamer-btn !py-4 text-center block">
                        <div class="flex items-center justify-center space-x-3">
                            <i data-lucide="message-circle" class="w-5 h-5"></i>
                            <span>Comprar por WhatsApp</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- WhatsApp Floating Button -->
    <div class="fixed bottom-10 right-10 z-50">
        <a href="https://wa.me/yournumber" class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center shadow-2xl hover:bg-green-600 transition-all duration-300 hover:scale-110">
            <i data-lucide="message-circle" class="w-8 h-8"></i>
        </a>
    </div>

    <script src="js/db-mock.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/courses.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
